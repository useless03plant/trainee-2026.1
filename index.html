<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IAPE - Educação que transforma</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

:root{
  --primary:#1d5cff;
  --dark:#081420;
  --yellow:#ffcb2f;
  --white:#ffffff;
}

/* LINHA AZUL */

.highlight-bar{
  width:100%;
  height:10px;
  background:#062349;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
}

/* HERO */

.hero{
  width:100%;
  min-height:100vh;
  position:relative;

  background:
  linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.55)
  ),
  url('https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png');

  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* HEADER */

.topbar{
  width:100%;
  padding:18px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:10px;
  left:0;

  z-index:999;

  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);

  transition:.3s;
}

.topbar.scrolled{
  background:rgba(0,0,0,.85);
  padding:14px 40px;
}

/* LOGO */

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:55px;
  height:55px;
  border-radius:12px;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  background:white;
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-text h1{
  font-size:30px;
  line-height:1;
}

.logo-text span{
  font-size:13px;
  opacity:.85;
}

/* ÁREA DIREITA */

.right-area{
  display:flex;
  align-items:center;
  gap:25px;
}

/* MENU */

.menu{
  display:flex;
  align-items:center;
  gap:35px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.menu a:hover{
  color:var(--yellow);
}

/* BOTÃO SANDUÍCHE */

.menu-toggle{
  width:45px;
  height:35px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  cursor:pointer;
  z-index:1001;
}

.menu-toggle span{
  width:100%;
  height:5px;
  background:white;
  border-radius:20px;
  transition:.3s;
}

/* ANIMAÇÃO */

.menu-toggle.active span:nth-child(1){
  transform:translateY(15px) rotate(45deg);
}

.menu-toggle.active span:nth-child(2){
  opacity:0;
}

.menu-toggle.active span:nth-child(3){
  transform:translateY(-15px) rotate(-45deg);
}

/* HERO CONTENT */

.hero-content{
  width:100%;
  min-height:100vh;

  display:flex;
  align-items:center;

  padding:160px 60px 80px;
}

.hero-left{
  max-width:700px;
}

.subtitle{
  color:#2f72ff;
  font-size:28px;

  margin-bottom:10px;

  display:flex;
  align-items:center;
  gap:15px;
}

.subtitle::before{
  content:'';
  width:45px;
  height:2px;
  background:#2f72ff;
}

.hero-title{
  font-size:clamp(55px, 9vw, 100px);
  font-weight:300;
  line-height:1.1;

  margin-bottom:40px;
}

.hero-title .blue{
  color:#2f72ff;
  font-weight:500;
}

/* BOTÃO VÍDEO */

.play-btn{
  background:#0f2b4b;
  border:none;

  color:white;

  padding:22px 34px;
  border-radius:60px;

  font-size:22px;

  display:flex;
  align-items:center;
  gap:18px;

  cursor:pointer;

  transition:.3s;
}

.play-btn:hover{
  transform:translateY(-3px);
  background:#123b67;
}

.play-icon{
  width:44px;
  height:44px;

  border-radius:50%;
  border:2px solid white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;
}

/* FORMULÁRIO */

.form-section{
  padding:100px 30px;
  background:#081420;
}

.container{
  max-width:900px;
  margin:auto;
}

.section-title{
  font-size:48px;
  margin-bottom:40px;
  text-align:center;
}

.form-area{
  background:#102133;
  padding:40px;
  border-radius:25px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.input-group input,
.input-group textarea{
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  font-size:18px;
  outline:none;
  background:#fff;
  color:#000;
}

.input-group textarea{
  min-height:140px;
  resize:none;
}

.input-group button{
  background:var(--primary);
  color:white;
  border:none;
  padding:18px;
  border-radius:15px;
  cursor:pointer;
  font-size:20px;
  transition:.3s;
}

.input-group button:hover{
  background:#1449d1;
}

.messages{
  margin-top:40px;
}

.message-item{
  background:#0d1825;
  padding:18px;
  border-radius:15px;
  margin-bottom:15px;
  border-left:4px solid var(--primary);
}

.message-item strong{
  display:block;
  margin-bottom:8px;
  color:#4b86ff;
}

/* MODAL */

.video-modal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.92);

  display:none;
  justify-content:center;
  align-items:center;

  z-index:2000;

  padding:20px;
}

.video-box{
  width:100%;
  max-width:900px;
  aspect-ratio:16/9;

  background:#000;

  border-radius:20px;
  overflow:hidden;

  position:relative;
}

.video-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-modal{
  position:absolute;
  top:15px;
  right:15px;

  background:rgba(0,0,0,.7);
  color:white;

  border:none;

  width:50px;
  height:50px;

  border-radius:50%;

  font-size:24px;
  cursor:pointer;

  z-index:10;

  transition:.3s;
}

.close-modal:hover{
  background:#1d5cff;
  transform:scale(1.1);
}

/* FOOTER */

footer{
  padding:35px;
  text-align:center;

  background:#050b12;
  color:#aaa;
}

/* RESPONSIVO */

@media(max-width:900px){

  .menu{
    position:fixed;
    top:0;
    right:-100%;

    width:280px;
    height:100vh;

    background:#07111d;

    flex-direction:column;
    justify-content:center;
    align-items:center;

    transition:.4s;
  }

  .menu.active{
    right:0;
  }

  .menu-toggle{
    display:flex;
  }

  .hero-content{
    padding:170px 30px 80px;
  }

  .hero-title{
    font-size:65px;
  }

  .subtitle{
    font-size:20px;
  }

}

@media(max-width:600px){

  .topbar{
    padding:18px 20px;
  }

  .hero-title{
    font-size:52px;
  }

  .play-btn{
    width:100%;
    justify-content:center;
  }

  .section-title{
    font-size:36px;
  }

}

</style>
</head>

<body>

<div class="highlight-bar"></div>

<section class="hero">

<header class="topbar" id="topbar">

  <div class="logo">

    <div class="logo-icon">
      <img src="logo.png" alt="Logo Educação Adventista">
    </div>

    <div class="logo-text">
      <h1>IAPE</h1>
      <span>Instituto Adventista</span>
    </div>

  </div>

  <div class="right-area">

    <nav class="menu" id="menu">

      <a href="#matriculas">MATRÍCULAS</a>

      <a href="#estrutura">ESTRUTURA</a>

      <a href="#ensino">
        ENSINO
      </a>

    </nav>

    <div class="menu-toggle" id="menuToggle">

      <span></span>
      <span></span>
      <span></span>

    </div>

  </div>

</header>

<div class="hero-content">

  <div class="hero-left">

    <div class="subtitle">
      EDUCAÇÃO QUE TRANSFORMA
    </div>

    <h1 class="hero-title">
      Muito Além <br>
      do Ensino <br>
      <span class="blue">Para a vida</span> inteira
    </h1>

    <button class="play-btn" id="playVideo">

      <div class="play-icon">▶</div>

      Reproduzir Vídeo

    </button>

  </div>

</div>

</section>

<section class="form-section" id="matriculas">

  <div class="container">

    <h2 class="section-title">
      Envie sua mensagem
    </h2>

    <div class="form-area">

      <div class="input-group">

        <input
          type="text"
          id="name"
          placeholder="Seu nome"
        >

        <textarea
          id="message"
          placeholder="Digite sua mensagem">
        </textarea>

        <button onclick="saveMessage()">
          Enviar Mensagem
        </button>

      </div>

      <div class="messages" id="messages"></div>

    </div>

  </div>

</section>

<footer>
  © 2026 IAPE - Todos os direitos reservados.
</footer>

<!-- MODAL DO VÍDEO -->

<div class="video-modal" id="videoModal">

  <div class="video-box">

    <button class="close-modal" id="closeModal">
      ✕
    </button>

    <iframe
      id="videoFrame"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  </div>

</div>

<script>

/* CONFIG */

const CONFIG = {

  WEB_APP_URL:
  "https://script.google.com/macros/s/AKfycbxuT2yBJkQyqyuy-vJreOUonrH7HIYVQfHbTUexvdD4i04Gc6-eBPNfPqRxR9LXZbc0/exec"

};

/* MENU MOBILE */

const menuToggle =
document.getElementById("menuToggle");

const menu =
document.getElementById("menu");

menuToggle.addEventListener("click", () => {

  menu.classList.toggle("active");

  menuToggle.classList.toggle("active");

});

/* FECHAR MENU */

document.querySelectorAll(".menu a")
.forEach(link => {

  link.addEventListener("click", () => {

    menu.classList.remove("active");

    menuToggle.classList.remove("active");

  });

});

/* HEADER */

const topbar =
document.getElementById("topbar");

window.addEventListener("scroll", () => {

  if(window.scrollY > 50){

    topbar.classList.add("scrolled");

  }else{

    topbar.classList.remove("scrolled");

  }

});

/* VÍDEO */

const playVideo =
document.getElementById("playVideo");

const videoModal =
document.getElementById("videoModal");

const closeModal =
document.getElementById("closeModal");

const videoFrame =
document.getElementById("videoFrame");

playVideo.addEventListener("click", () => {

  videoModal.style.display = "flex";

  videoFrame.src =
  "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0";

});

/* FECHAR NO X */

closeModal.addEventListener("click", () => {

  videoModal.style.display = "none";

  videoFrame.src = "";

});

/* FECHAR CLICANDO FORA */

videoModal.addEventListener("click", (e) => {

  if(e.target === videoModal){

    videoModal.style.display = "none";

    videoFrame.src = "";

  }

});

/* JSONP */

function jsonp(url){

  return new Promise((resolve, reject) => {

    const callbackName =
    "jsonp_callback_" + Math.round(100000 * Math.random());

    window[callbackName] = function(data){

      delete window[callbackName];
      document.body.removeChild(script);

      resolve(data);
    };

    const script = document.createElement("script");

    script.src =
    url + (url.includes("?") ? "&" : "?") +
    "callback=" + callbackName;

    script.onerror = function(){

      delete window[callbackName];
      document.body.removeChild(script);

      reject("Erro JSONP");

    };

    document.body.appendChild(script);

  });

}

/* SALVAR */

async function saveMessage(){

  const name =
  document.getElementById("name").value.trim();

  const message =
  document.getElementById("message").value.trim();

  if(!name || !message){

    alert("Preencha todos os campos.");
    return;

  }

  try{

    await jsonp(

      `${CONFIG.WEB_APP_URL}?action=add&name=${encodeURIComponent(name)}&message=${encodeURIComponent(message)}`

    );

    document.getElementById("name").value = "";
    document.getElementById("message").value = "";

    loadMessages();

    alert("Mensagem enviada com sucesso!");

  }catch(error){

    alert("Erro ao salvar.");

  }

}

/* LISTAR */

async function loadMessages(){

  try{

    const data = await jsonp(

      `${CONFIG.WEB_APP_URL}?action=list`

    );

    const container =
    document.getElementById("messages");

    container.innerHTML = "";

    data.forEach(item => {

      container.innerHTML += `
        <div class="message-item">
          <strong>${item.name}</strong>
          <div>${item.message}</div>
        </div>
      `;

    });

  }catch(error){

    console.error(error);

  }

}

loadMessages();

</script>

</body>
</html>
