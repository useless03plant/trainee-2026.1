<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IAPE - Educação que transforma</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

:root{
  --primary:#1d5cff;
  --dark:#081420;
  --yellow:#ffcb2f;
  --white:#ffffff;
}

/* HERO */
.hero{
  width:100%;
  min-height:100vh;
  position:relative;

  background:
  linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.55)
  ),
  url('https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png');

  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* HEADER */
.topbar{
  width:100%;
  padding:18px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:0;
  left:0;

  z-index:999;

  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);

  transition:.3s;
}

.topbar.scrolled{
  background:rgba(0,0,0,.85);
  padding:14px 40px;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:55px;
  height:55px;
  border-radius:12px;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-text h1{
  font-size:30px;
  line-height:1;
}

.logo-text span{
  font-size:13px;
  opacity:.85;
}

/* RIGHT AREA */
.right-area{
  display:flex;
  align-items:center;
  gap:25px;
}

/* MENU */
.menu{
  display:flex;
  align-items:center;
  gap:35px;
}

@media(max-width:900px){

  .menu{
    position:fixed;
    top:0;
    right:-100%;
    width:300px;
    height:100vh;

    background:#07111d;

    flex-direction:column;
    justify-content:center;
    align-items:flex-start;

    padding-left:40px;

    transition:.4s;

    box-shadow:-10px 0 30px rgba(0,0,0,.4);
  }

  .menu.active{
    right:0;
  }

  .menu a{
    font-size:24px;
  }
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.menu a:hover{
  color:var(--yellow);
}

/* BOTÃO SANDUÍCHE */
.menu-toggle{
  width:45px;
  height:35px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  cursor:pointer;
  z-index:1001;
}

.menu-toggle span{
  width:100%;
  height:5px;
  background:white;
  border-radius:20px;
  transition:.3s;
}

/* OVERLAY */
.menu-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,.55);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:998;
}

.menu-overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ANIMAÇÃO X */
.menu-toggle.active span:nth-child(1){
  transform:translateY(15px) rotate(45deg);
}

.menu-toggle.active span:nth-child(2){
  opacity:0;
}

.menu-toggle.active span:nth-child(3){
  transform:translateY(-15px) rotate(-45deg);
}

</style>
</head>

<body>

<section class="hero">

<header class="topbar" id="topbar">

  <div class="logo">
    <div class="logo-icon">
      <img src="data:image/png;base64,iVBORw0..." alt="">
    </div>
    <div class="logo-text">
      <h1>IAPE</h1>
      <span>Instituto Adventista</span>
    </div>
  </div>

  <div class="right-area">

    <nav class="menu" id="menu">

      <a href="#matriculas">MATRÍCULAS</a>
      <a href="#estrutura">ESTRUTURA</a>
      <a href="#ensino" class="active">ENSINO</a>
      <a href="#sobre">SOBRE</a>
      <a href="#equipe">EQUIPE</a>
      <a href="#localizacao">LOCALIZAÇÃO</a>
      <a href="#galeria">GALERIA DE FOTOS</a>

    </nav>

    <div class="menu-toggle" id="menuToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <!-- FIX: overlay corretamente posicionado -->
  <div class="menu-overlay" id="menuOverlay"></div>

</header>

</section>

<script>

/* MENU */
const menuToggle = document.getElementById("menuToggle");
const menu = document.getElementById("menu");
const menuOverlay = document.getElementById("menuOverlay");

menuToggle.addEventListener("click", () => {
  menu.classList.toggle("active");
  menuToggle.classList.toggle("active");
  menuOverlay.classList.toggle("active");
});

menuOverlay.addEventListener("click", () => {
  menu.classList.remove("active");
  menuToggle.classList.remove("active");
  menuOverlay.classList.remove("active");
});

document.querySelectorAll(".menu a").forEach(link => {
  link.addEventListener("click", () => {
    menu.classList.remove("active");
    menuToggle.classList.remove("active");
    menuOverlay.classList.remove("active");
  });
});

/* HEADER SCROLL */
const topbar = document.getElementById("topbar");

window.addEventListener("scroll", () => {
  if(window.scrollY > 50){
    topbar.classList.add("scrolled");
  } else {
    topbar.classList.remove("scrolled");
  }
});

</script>

</body>
</html>
