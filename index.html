<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IAPE - Educação que transforma</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

:root{
  --primary:#1d5cff;
  --dark:#081420;
  --yellow:#ffcb2f;
  --white:#ffffff;
}

/* LINHA AZUL */

.highlight-bar{
  width:100%;
  height:10px;
  background:#062349;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
}

/* HERO */

.hero{
  width:100%;
  min-height:100vh;
  position:relative;

  background:
  linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.55)
  ),
  url('https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png');

  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* HEADER */

.topbar{
  width:100%;
  padding:18px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:10px;
  left:0;

  z-index:999;

  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);

  transition:.3s;
}

.topbar.scrolled{
  background:rgba(0,0,0,.85);
  padding:14px 40px;
}

/* LOGO */

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:55px;
  height:55px;
  border-radius:12px;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  background:white;
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-text h1{
  font-size:30px;
  line-height:1;
}

.logo-text span{
  font-size:13px;
  opacity:.85;
}

/* ÁREA DIREITA */

.right-area{
  display:flex;
  align-items:center;
  gap:25px;
}

/* MENU */

.menu{
  display:flex;
  align-items:center;
  gap:35px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.menu a:hover{
  color:var(--yellow);
}

/* BOTÃO SANDUÍCHE */

.menu-toggle{
  width:45px;
  height:35px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  cursor:pointer;
  z-index:1001;
}

.menu-toggle span{
  width:100%;
  height:5px;
  background:white;
  border-radius:20px;
}

/* HERO CONTENT */

.hero-content{
  width:100%;
  min-height:100vh;

  display:flex;
  align-items:center;

  padding:160px 60px 80px;
}

.hero-left{
  max-width:700px;
}

.subtitle{
  color:#2f72ff;
  font-size:28px;
  margin-bottom:10px;
}

.hero-title{
  font-size:clamp(55px, 9vw, 100px);
  font-weight:300;
  line-height:1.1;
  margin-bottom:40px;
}

.hero-title .blue{
  color:#2f72ff;
}

/* BOTÃO */

.play-btn{
  background:#0f2b4b;
  border:none;
  color:white;
  padding:22px 34px;
  border-radius:60px;
  font-size:22px;
  display:flex;
  align-items:center;
  gap:18px;
  cursor:pointer;
}

/* FORM */

.form-section{
  padding:100px 30px;
  background:#081420;
}

.container{
  max-width:900px;
  margin:auto;
}

.section-title{
  font-size:48px;
  margin-bottom:40px;
  text-align:center;
}

.form-area{
  background:#102133;
  padding:40px;
  border-radius:25px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.input-group input,
.input-group textarea{
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  font-size:18px;
}

.input-group button{
  background:var(--primary);
  color:white;
  border:none;
  padding:18px;
  border-radius:15px;
  cursor:pointer;
}

/* FOOTER */

footer{
  padding:35px;
  text-align:center;
  background:#050b12;
  color:#aaa;
}

</style>
</head>

<body>

<div class="highlight-bar"></div>

<section class="hero">

<header class="topbar">

  <div class="logo">

    <div class="logo-icon">
      <img src="/mnt/data/0.png" alt="Logo Educação Adventista">
    </div>

    <div class="logo-text">
      <h1>IAPE</h1>
      <span>Instituto Adventista</span>
    </div>

  </div>

</header>

</section>

</body>
</html>
